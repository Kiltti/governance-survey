<!-- cache-bust 1 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Charity Governance Health Check</title>

  <!-- SurveyJS DefaultV2 Theme -->
<link href="https://unpkg.com/survey-core@1.12.61/defaultV2.min.css" rel="stylesheet" />

<!-- Knockout -->
<script src="https://unpkg.com/knockout/build/output/knockout-latest.js"></script>

<!-- SurveyJS Core -->
<script src="https://unpkg.com/survey-core@1.12.61/survey.core.min.js"></script>

<!-- SurveyJS Knockout (includes UI renderer) -->
<script src="https://unpkg.com/survey-knockout@1.12.61/survey.ko.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem 3rem;
    }
    #surveyContainer {
      margin-top: 1.5rem;
    }
    .thankyou {
      margin-top: 2rem;
      padding: 1rem;
      border-radius: 6px;
      background: #f3f7ff;
      border: 1px solid #d0ddff;
    }
  </style>
</head>
<body>
  <h1>Charity Governance Health Check</h1>
  <p>
    This thorough governance health check is designed to give your board a clear, supportive snapshot
    of how you’re doing against key areas of good practice.
  </p>

  <div id="surveyContainer"></div>
  <div id="thankyouContainer" class="thankyou" style="display:none;"></div>

  <script>
    // 1. Your SurveyJS JSON (exported from SurveyJS)
    //    Either paste it inline here, or load from survey.json.
    //    For now, we’ll assume you have a separate survey.json file.
    const SURVEY_JSON_URL = "survey-v3.json";

    // 2. Your Google Apps Script Web App URL (replace this with your real one)
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzz7lO8r3o1U7KEYbWx0b34SApCrt1PseX7ptYjoUwCRqyMRtCsTkq3W1zRj4JvRktt/exec";
    // Load the survey JSON
    fetch(SURVEY_JSON_URL)
      .then(r => r.json())
      .then(json => {
        const survey = new Survey.Model(json);

        // Handle completion
        survey.onComplete.add(function(sender) {
          const data = sender.data;

          // POST to Apps Script
          fetch(APPS_SCRIPT_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
          }).catch(err => {
            console.error("Error sending to Apps Script", err);
          });

          // Show thank-you message
          const thankyou = document.getElementById("thankyouContainer");
          thankyou.style.display = "block";
          thankyou.innerHTML = `
            <h2>Thank you for completing the governance health check</h2>
            <p>
              Your responses have been recorded. A brief governance summary report will be sent
              to the email address you provided.
            </p>
          `;
        });

        // Render the survey (correct Knockout UI method)
const root = document.getElementById("surveyContainer");
const surveyElement = document.createElement("div");
root.appendChild(surveyElement);

Survey.StylesManager.applyTheme("defaultV2");
survey.render(surveyElement);

      })
      .catch(err => {
        console.error("Error loading survey JSON", err);
      });
  </script>
</body>
</html>
