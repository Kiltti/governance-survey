<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test Survey</title>

  <link href="https://unpkg.com/survey-core/defaultV2.min.css" rel="stylesheet">

  <!-- IMPORTANT: use the UMD bundle -->
  <script src="https://unpkg.com/survey-jquery@1.11.3/survey.jquery.min.js"></script>
</head>

<body>

<div id="surveyContainer"></div>

<script>
  const json = {
    elements: [
      { type: "text", name: "name", title: "Your name:" }
    ]
  };

  const survey = new Survey.Model(json);

  survey.render("surveyContainer");
</script>

</body>
</html>
